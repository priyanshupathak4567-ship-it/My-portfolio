<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Delivered</title>

  <style>

    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f4f4f4;
    }

    .box{
      background:white;
      padding:40px;
      text-align:center;
      border-radius:15px;
      box-shadow:0 0 15px rgba(0,0,0,0.2);
    }

    .tick{
      font-size:80px;
      color:green;
    }

    h1{
      color:#0b3d91;
      margin-top:15px;
    }

    p{
      margin-top:10px;
      font-size:18px;
    }

    a{
      display:inline-block;
      margin-top:20px;
      padding:12px 20px;
      background:#0b3d91;
      color:white;
      text-decoration:none;
      border-radius:8px;
    }

    a:hover{
      background:#072b63;
    }

  </style>
</head>

<body>

  <div class="box">

    <div class="tick">?</div>

    <h1>Your Message Was Delivered</h1>

    <p>Thank you for contacting us.</p>

    <a href="index.html">Go Back</a>

  </div>

</body>
</html>
